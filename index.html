<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 24px;
        }

        .video-item {
            margin: 30px 0;
        }

        .video-item h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        button {
            padding: 8px 16px;
            margin-top: 10px;
            margin-right: 8px;
            /* 增加按钮间距 */
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
            /* 增加hover效果 */
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>视频合集（永久更新）</h1>

        <!-- 首页 -->
        <div id="home" class="page active">
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <button onclick="go('video1')">播放视频1</button>
            </div>
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <button onclick="go('video2')">播放视频2</button>
            </div>
            <div class="video-item">
                <h3>视频3：备用测试</h3>
                <button onclick="go('video3')">打开视频3</button>
            </div>
        </div>

        <!-- 视频1 - 使用GitHub官方原始地址 -->
        <div id="video1" class="page">
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <!-- 替换为GitHub Releases官方地址，去掉第三方加速域名 -->
                <video controls crossorigin="anonymous"
                    src="https://github.com/skskskmmm/hnrd/releases/download/视频/121.mp4">
                    你的浏览器不支持HTML5视频播放
                </video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

        <!-- 视频2 -->
        <div id="video2" class="page">
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <video controls src="https://www.w3school.com.cn/i/movie.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

        <!-- 视频3 - 修正标题和冗余按钮 -->
        <div id="video3" class="page">
            <div class="video-item">
                <h3>视频3：备用测试</h3>
                <p>可在此处添加视频3的播放地址</p>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>
    </div>

    <script>
        // 页面切换核心函数
        function go(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面（增加容错，避免找不到页面报错）
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active');
            } else {
                console.warn('未找到页面：', pageId);
                // 找不到页面时默认返回首页
                document.getElementById('home').classList.add('active');
            }
        }
    </script>
</body>

</html>
