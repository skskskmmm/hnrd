<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 24px;
        }

        .video-item {
            margin: 30px 0;
        }

        .video-item h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        button {
            padding: 8px 16px;
            margin-top: 10px;
            margin-right: 8px;
            /* 增加按钮间距，更美观 */
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
            /* 鼠标悬浮效果，提升体验 */
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>视频合集（永久更新）</h1>

        <!-- 首页：补充video4-video7的触发按钮，这是页面能显示的核心 -->
        <div id="home" class="page active">
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <button onclick="go('video1')">播放视频1</button>
            </div>
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <button onclick="go('video2')">播放视频2</button>
            </div>
            <div class="video-item">
                <h3>视频3：备用测试</h3>
                <button onclick="go('video3')">打开视频3</button>
            </div>
            <!-- 新增video4-video7的触发按钮 -->
            <div class="video-item">
                <h3>视频4：测试视频</h3>
                <button onclick="go('video4')">打开视频4</button>
            </div>
            <div class="video-item">
                <h3>视频5：测试视频</h3>
                <button onclick="go('video5')">打开视频5</button>
            </div>
            <div class="video-item">
                <h3>视频6：测试视频</h3>
                <button onclick="go('video6')">打开视频6</button>
            </div>
            <div class="video-item">
                <h3>视频7：测试视频</h3>
                <button onclick="go('video7')">打开视频7</button>
            </div>
        </div>

        <!-- 视频1 -->
        <div id="video1" class="page">
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <video controls src="https://skskskmmm.github.io/hnrd/121.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

        <!-- 视频2（取消注释，保留示例） -->
        <div id="video2" class="page">
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <video controls src="https://www.w3school.com.cn/i/movie.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

        <!-- 视频3：优化冗余按钮和错误标题 -->
        <div id="video3" class="page">
            <div class="video-item">
                <h3>视频3：备用测试</h3>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

        <!-- 测试区域：修正拼写错误+确保id与按钮对应 -->
        <div id="video4" class="page">
            <div class="video-item">
                <h3>视频4：测试视频</h3>
                <video controls src="https://skskskmmm.github.io/hnrd/121.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>
        <div id="video5" class="page">
            <div class="video-item">
                <h3>视频5：测试视频</h3>
                <video controls src="https://skskskmmm.github.io/hnrd/121.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>
        <!-- 修正：vide6 → video6（补全o） -->
        <div id="video6" class="page">
            <div class="video-item">
                <h3>视频6：测试视频</h3>
                <video controls src="https://skskskmmm.github.io/hnrd/121.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>
        <div id="video7" class="page">
            <div class="video-item">
                <h3>视频7：测试视频</h3>
                <video controls src="https://skskskmmm.github.io/hnrd/121.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

    </div>

    <script>
        // 优化：增加容错，避免找不到页面时报错
        function go(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active');
            } else {
                // 找不到页面时，默认返回首页并提示
                console.warn('未找到页面：', pageId);
                document.getElementById('home').classList.add('active');
            }
        }
    </script>
</body>

</html>
