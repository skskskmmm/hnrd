<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 24px;
        }

        .video-item {
            margin: 30px 0;
        }

        .video-item h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        button {
            padding: 8px 16px;
            margin-top: 10px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>视频合集（永久更新）</h1>

        <!-- 首页 -->
        <div id="home" class="page active">
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <button onclick="go('video1')">播放视频1</button>
            </div>
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <button onclick="go('video2')">播放视频2</button>
            </div>
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <button onclick="go('video3')">1111</button>
            </div>
        </div>

        <!-- 视频1 -->
        <div id="video1" class="page">
            <div class="video-item">
                <h3>视频1：测试视频</h3>
                <!-- 替换成你上传到GitHub的视频地址 -->
                <video controls src="https://skskskmmm.github.io/hnrd/121.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>

        <!-- 视频2 
        <div id="video2" class="page">
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <video controls src="https://www.w3school.com.cn/i/movie.mp4"></video>
                <br>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>
        -->

        <div id="video3" class="page">
            <div class="video-item">
                <h3>视频2：第二个视频</h3>
                <br>
                <button onclick="go('home')">返回列表</button>
                <button onclick="go('home')">返回列表</button>
                <button onclick="go('home')">返回列表</button>
            </div>
        </div>
    </div>

    <script>
        // 去掉pushState，仅保留页面切换功能
        function go(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面
            const targetPage = document.getElementById(pageId);
            if (targetPage) targetPage.classList.add('active');
        }
    </script>
</body>

</html>
